config:
  grpc_port:
    type: string
    default: "5002"
    source: yaml
  server_port:
    type: int
    default: "9002"
    source: yaml
  close_timeout:
    type: duration
    default: "5s"
    source: yaml
  db_dsn:
    type: string
    default: "host=localhost user=zdravoshag password=zdravoshag_secret dbname=zdravoshag search_path=core_health sslmode=disable"
    source: yaml
  nats_url:
    type: string
    default: "nats://localhost:4222"
    source: yaml
  redis_addr:
    type: string
    default: "localhost:6379"
    source: yaml
  redis_password:
    type: string
    default: ""
    source: yaml
  tracer_host:
    type: string
    default: "localhost"
    source: yaml
  tracer_port:
    type: string
    default: "4317"
    source: yaml
  service_name:
    type: string
    default: "core-health"
    source: yaml
  grpc_creteria_parser:
    type: string
    default: "127.0.0.1:5010"
    source: yaml
