syntax = "proto3";

package health;

option go_package = "github.com/helthtech/core-health/pkg/proto/health";

service HealthService {
  // --- Criteria ---
  rpc ListGroups(ListGroupsRequest) returns (ListGroupsResponse);
  rpc ListCriteria(ListCriteriaRequest) returns (ListCriteriaResponse);
  rpc SetUserCriterion(SetUserCriterionRequest) returns (SetUserCriterionResponse);
  rpc ResetCriteria(ResetCriteriaRequest) returns (ResetCriteriaResponse);
  rpc GetUserCriteria(GetUserCriteriaRequest) returns (GetUserCriteriaResponse);
  rpc GetProgress(GetProgressRequest) returns (GetProgressResponse);
  // Client streams 1+ PDFs (or same stream protocol): extracts text, calls OpenAI via creteria_parser, returns suggestions + pending_import_id (Redis, 1h) until the user confirms.
  rpc ImportCriteriaFromPdf(stream ImportCriteriaFromPdfRequest) returns (ImportCriteriaFromPdfResponse);
  // Apply or discard a pending import produced by ImportCriteriaFromPdf. accept=false removes Redis only.
  rpc ConfirmPendingImport(ConfirmPendingImportRequest) returns (ConfirmPendingImportResponse);
  // --- Recommendations ---
  rpc GetRecommendations(GetRecommendationsRequest) returns (GetRecommendationsResponse);
  rpc GetWeeklyRecommendations(GetWeeklyRecommendationsRequest) returns (GetWeeklyRecommendationsResponse);
  // --- Notifications ---
  rpc SendNotification(SendNotificationRequest) returns (SendNotificationResponse);
  // --- Admin ---
  rpc AdminListRecommendations(AdminListRecommendationsRequest) returns (AdminListRecommendationsResponse);
  rpc AdminUpsertRecommendation(AdminUpsertRecommendationRequest) returns (AdminUpsertRecommendationResponse);
  rpc AdminDeleteRecommendation(AdminDeleteRecommendationRequest) returns (AdminDeleteRecommendationResponse);
  rpc AdminUpsertCriterion(AdminUpsertCriterionRequest) returns (AdminUpsertCriterionResponse);
}

// --- Criterion groups ---

message CriterionGroup {
  string id = 1;
  string name = 2;
  int32 sort_order = 3;
}

message ListGroupsRequest {}

message ListGroupsResponse {
  repeated CriterionGroup groups = 1;
}

// --- Criteria ---

// sex: "male", "female", or "" for all
// input_type: "numeric", "check", or "boolean"
// lifetime: days before expiry; 0 = no expiry
// min_value/max_value: normal value range (numeric only); delta: non-critical deviation width
message Criterion {
  string id = 1;
  string name = 2;
  int32 level = 3;
  string sex = 4;
  string input_type = 6;
  int32 lifetime = 7;
  string group_id = 8;
  int32 sort_order = 9;
  optional double min_value = 10;
  optional double max_value = 11;
  optional double delta = 12;
  // Where to go / how to obtain this measurement (lab, clinic, home device, etc.).
  string instruction = 13;
}

message ListCriteriaRequest {
  string user_id = 1;
  string user_sex = 2;
}

message ListCriteriaResponse {
  repeated Criterion criteria = 1;
}

message SetUserCriterionRequest {
  string user_id = 1;
  string criterion_id = 2;
  string value = 3;
  string source = 4;
  string measured_at = 5; // ISO 8601 date, optional (e.g. "2025-03-15")
  // Optional; same semantics as GetUserCriteria. Used when building the returned entry (sex-specific criteria).
  string user_sex = 6;
}

message SetUserCriterionResponse {
  bool success = 1;
  // Echo of the updated user row for this criterion (includes instruction). Omitted if criterion is hidden for user_sex.
  UserCriterionEntry entry = 2;
}

message ResetCriteriaRequest {
  string user_id = 1;
}

message ResetCriteriaResponse {
  bool success = 1;
}

message UserCriterionEntry {
  string criterion_id = 1;
  string criterion_name = 2;
  string value = 3;
  string status = 4;
  string recommendation = 5;
  int32 level = 6;
  string severity = 7;
  string input_type = 8;
  string group_id = 9;
  string instruction = 10;
}

message GetUserCriteriaRequest {
  string user_id = 1;
  string user_sex = 2;
}

message GetUserCriteriaResponse {
  repeated UserCriterionEntry entries = 1;
}

message GetProgressRequest {
  string user_id = 1;
}

message GetProgressResponse {
  int32 total = 1;
  int32 filled = 2;
  double percent = 3;
  string level_label = 4;
}

// Set user_id and user_sex (optional) in the first message. Every message may carry filename and chunk: concatenate by filename in order, one PDF is expected per stream; user_id is required to store pending state.
message ImportCriteriaFromPdfRequest {
  string filename = 1;
  bytes chunk = 2;
  string user_id = 3;
  string user_sex = 4;
}

// Matched catalog criterion + value extracted from the document (same ids as ListCriteria / SetUserCriterion).
message ImportedUserCriterion {
  string criterion_id = 1;
  string criterion_name = 2;
  string value = 3;
  string input_type = 4; // "numeric", "check", "boolean" — from our criterion definition
  string measured_at = 5; // optional ISO 8601 date if derivable from the document
  string instruction = 6; // from catalog (where to obtain this criterion)
}

message ImportCriteriaFromPdfResponse {
  repeated ImportedUserCriterion user_criteria = 1;
  // Staging id for ConfirmPendingImport; empty if no suggestions.
  string pending_import_id = 2;
  string model_note = 3;
}

message ConfirmPendingImportRequest {
  string user_id = 1;
  string pending_id = 2;
  // true: write to user_criteria; false: only delete from Redis
  bool accept = 3;
  string user_sex = 4;
}

message ConfirmPendingImportResponse {
  int32 applied = 1;
  bool success = 2;
  string error_message = 3;
}

// --- Recommendations ---

message Recommendation {
  string criterion_id = 1;
  string criterion_name = 2;
  string text = 3;
  string severity = 4;
}

message GetRecommendationsRequest {
  string user_id = 1;
  string user_sex = 2;
}

message GetRecommendationsResponse {
  repeated Recommendation recommendations = 1;
}

// WeeklyRecommendationItem is one entry in a user's weekly plan.
message WeeklyRecommendationItem {
  string recommendation_id = 1;
  string criterion_id = 2;
  string criterion_name = 3;
  string type = 4;
  string title = 5;
  int32 weight = 6;
}

message GetWeeklyRecommendationsRequest {
  string user_id = 1;
}

message GetWeeklyRecommendationsResponse {
  repeated WeeklyRecommendationItem items = 1;
  string week_start = 2;
}

// --- Notifications ---

message SendNotificationRequest {
  string user_id = 1;
  string channel = 2;
  string notification_type = 3;
  string template_code = 4;
  string payload_json = 5;
}

message SendNotificationResponse {}

// --- Admin ---

message AdminRecommendation {
  string id = 1;
  string criterion_id = 2;
  string type = 3;
  string title = 4;
  repeated string texts = 5;
  int32 base_weight = 6;
}

message AdminListRecommendationsRequest {
  string criterion_id = 1; // empty = all
}

message AdminListRecommendationsResponse {
  repeated AdminRecommendation recommendations = 1;
}

message AdminUpsertRecommendationRequest {
  AdminRecommendation recommendation = 1;
}

message AdminUpsertRecommendationResponse {
  AdminRecommendation recommendation = 1;
}

message AdminDeleteRecommendationRequest {
  string id = 1;
}

message AdminDeleteRecommendationResponse {
  bool success = 1;
}

message AdminUpsertCriterionRequest {
  Criterion criterion = 1;
}

message AdminUpsertCriterionResponse {
  Criterion criterion = 1;
}
