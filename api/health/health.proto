syntax = "proto3";

package health;

option go_package = "github.com/helthtech/core-health/pkg/proto/health";

service HealthService {
  rpc ListAnalysis(ListAnalysisRequest) returns (ListAnalysisResponse);
  rpc ListCriteria(ListCriteriaRequest) returns (ListCriteriaResponse);
  rpc SetUserCriterion(SetUserCriterionRequest) returns (SetUserCriterionResponse);
  rpc ResetAnalysisCriteria(ResetAnalysisCriteriaRequest) returns (ResetAnalysisCriteriaResponse);
  rpc GetUserCriteria(GetUserCriteriaRequest) returns (GetUserCriteriaResponse);
  rpc GetProgress(GetProgressRequest) returns (GetProgressResponse);
  rpc GetRecommendations(GetRecommendationsRequest) returns (GetRecommendationsResponse);
  rpc SendNotification(SendNotificationRequest) returns (SendNotificationResponse);
}

message Analysis {
  string id = 1;
  string name = 2;
  // lifetime in days; 0 means no expiry
  int32 lifetime = 3;
  // sex restriction: "male", "female", or "" for all
  string sex = 4;
  // blocked_by: "", "level_1", "level_2", or "criteria_<uuid>"
  string blocked_by = 5;
}

// ListAnalysisRequest optionally filters by user context (sex + blocking rules).
message ListAnalysisRequest {
  string user_id = 1;
  string user_sex = 2;
}

message ListAnalysisResponse {
  repeated Analysis analyses = 1;
}

message Criterion {
  string id = 1;
  string name = 2;
  string analysis_id = 3;
  int32 level = 4;
}

message ListCriteriaRequest {
  string analysis_id = 1;
}

message ListCriteriaResponse {
  repeated Criterion criteria = 1;
}

message SetUserCriterionRequest {
  string user_id = 1;
  string criterion_id = 2;
  string value = 3;
  string source = 4;
}

message SetUserCriterionResponse {
  bool success = 1;
}

message UserCriterionEntry {
  string criterion_id = 1;
  string criterion_name = 2;
  string analysis_id = 3;
  string analysis_name = 4;
  string value = 5;
  string status = 6;
  string recommendation = 7;
  int32 level = 8;
  string severity = 9;
}

message GetUserCriteriaRequest {
  string user_id = 1;
  string user_sex = 2;
}

message GetUserCriteriaResponse {
  repeated UserCriterionEntry entries = 1;
}

message GetProgressRequest {
  string user_id = 1;
}

message GetProgressResponse {
  int32 total = 1;
  int32 filled = 2;
  double percent = 3;
  string level_label = 4;
}

message Recommendation {
  string criterion_id = 1;
  string criterion_name = 2;
  string analysis_name = 3;
  string text = 4;
  string severity = 5;
}

message GetRecommendationsRequest {
  string user_id = 1;
  string user_sex = 2;
}

message GetRecommendationsResponse {
  repeated Recommendation recommendations = 1;
}

message ResetAnalysisCriteriaRequest {
  string user_id = 1;
  string analysis_id = 2;
}

message ResetAnalysisCriteriaResponse {
  bool success = 1;
}

message SendNotificationRequest {
  string user_id = 1;
  string channel = 2;
  string notification_type = 3;
  string template_code = 4;
  string payload_json = 5;
}

message SendNotificationResponse {}
